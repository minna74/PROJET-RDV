version: '3.8'
services:
  web:
    build: .
    container_name: projet_rdv_web
    ports:
      - "8080:80"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - db
  db:
    image: mysql:8.0
    container_name: projet_rdv_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:
